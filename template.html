<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} {{SUBTITLE}}</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <div class="page">
        <img src="../images/common/hero-background.svg" alt="" class="hero-bg-img">
        <div class="hero-main-container">
            <div class="hero-top-container">
                <img src="../images/common/logo.svg" alt="Rythmos Logo" class="logo-img">
                <h1 class="product-title">
                    {{TITLE}} <span>{{SUBTITLE}}</span>
                </h1>
                <p class="technical-spec">
                    {{REF}}
                </p>
            </div>
            <div class="hero-bottom-container">
                {{HERO_BOTTOM_CONTENT}}
            </div>
        </div>

        <section class="overview-container">
            <div class="overview-image-box">
                <img src="../images/{{FOLDER}}/{{OVERVIEW_IMAGE_FILE}}" alt="{{TITLE}} {{SUBTITLE}} Overview">
            </div>
            <div class="overview-text-container">
                <h2 class="overview-title">Overview</h2>
                <p class="overview-description">
                    {{HERO_DESCRIPTION}}
                </p>
                {{DETECTION_CAPABILITIES}}
            </div>
        </section>

        <main class="main-content-container">
            <section class="capabilities-section">
                <h2 class="capabilities-title">{{CAPABILITIES_TITLE}}</h2>
                <div class="capabilities-grid">
                    {{CAPABILITIES_GRID}}
                </div>
            </section>

            {{SPECS_SECTION}}

            {{FEATURES_SECTION}}

            {{TOPOLOGY_SECTION}}

            <section class="installation-section">
                <h2 class="installation-title">Installation Guidelines</h2>
                <div class="installation-grid">
                    {{INSTALLATION_GRID}}
                </div>
            </section>

            <footer class="footer">
                <a href="https://intrexis.com" class="footer-link">intrexis.com</a>
                <img src="../images/common/logo-white.svg" alt="Rythmos Logo" class="footer-logo">
            </footer>
        </main>

        <img src="../images/{{FOLDER}}/{{HERO_IMAGE_FILE}}" alt="{{TITLE}} {{SUBTITLE}} Product" class="hero-product-image">
    </div>
    <script>
        function scalePage() {
            const scale = window.innerWidth / 1920;
            document.body.style.zoom = scale;

            const page = document.querySelector('.page');
            const footer = document.querySelector('.footer');
            if (page && footer) {
                const pageRect = page.getBoundingClientRect();
                const footerRect = footer.getBoundingClientRect();
                const footerBottomRelative = (footerRect.bottom / scale) - (pageRect.top / scale);

                page.style.height = (footerBottomRelative + 1) + 'px';
            }
        }

        const resizeObserver = new ResizeObserver(() => {
            scalePage();
        });

        window.addEventListener('DOMContentLoaded', () => {
            scalePage();
            const page = document.querySelector('.page');
            if (page) resizeObserver.observe(page);
        });

        window.addEventListener('resize', scalePage);
        window.addEventListener('load', scalePage);
    </script>
</body>

</html>
